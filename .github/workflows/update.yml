# .github/workflows/update.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs the awesome-curator pipeline on a daily schedule, commits the updated
# AWESOME.md back to the repository, and writes a job summary.
#
# Authentication
# ──────────────
# The built-in secrets.GITHUB_TOKEN is used automatically by GitHub Actions.
# No additional secrets need to be configured. The token is passed only as an
# environment variable — it is never written to any file or logged.
#
# Permissions
# ───────────
# `contents: write` is required to push the auto-commit back to the branch.
# ─────────────────────────────────────────────────────────────────────────────

name: Update Awesome List

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day
  workflow_dispatch:        # Allow manual runs from the GitHub Actions UI
    inputs:
      niche:
        description: "Niche key to curate (from config.yaml)"
        required: false
        default: "ai_llm"
      skip_link_check:
        description: "Skip link validation? (true/false)"
        required: false
        default: "false"

permissions:
  contents: write   # Required to commit and push the updated AWESOME.md

jobs:
  curate:
    name: Curate & Update
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          # Use the built-in token so git push is authenticated
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -e ".[dev]"

      # ── 4. Run the curator ─────────────────────────────────────────────────
      - name: Run awesome-curator
        env:
          # The built-in GITHUB_TOKEN gives 5,000 API requests/hour.
          # secrets.GITHUB_TOKEN is automatically available in all workflows.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NICHE="${{ github.event.inputs.niche || 'ai_llm' }}"
          SKIP_CHECK="${{ github.event.inputs.skip_link_check || 'false' }}"

          CMD="python -m curator --niche $NICHE"
          if [ "$SKIP_CHECK" = "true" ]; then
            CMD="$CMD --no-check"
          fi

          echo "Running: $CMD"
          $CMD

      # ── 5. Check for changes ───────────────────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in the following files:"
            git diff --name-only HEAD
          fi

      # ── 6. Commit & push if the list was updated ───────────────────────────
      - name: Commit updated awesome list
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: auto-update awesome list [${TIMESTAMP}]

          Generated by awesome-curator via GitHub Actions.
          Niche: ${{ github.event.inputs.niche || 'ai_llm' }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git push

      # ── 7. Summary (always runs) ───────────────────────────────────────────
      - name: Emit summary
        if: always()
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "✅ Awesome list updated and committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ Awesome list is already up to date — no commit needed." >> "$GITHUB_STEP_SUMMARY"
          fi
